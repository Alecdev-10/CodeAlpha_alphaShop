{% extends 'marketPlace/base.html' %}

{% block title %}
Login | AlphaShop
{% endblock %}

{% block content %}

<div class="form-container">

    <h2 class="form-title">

        Welcome Back

    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label for="username">

                Username

            </label>

            <input
                type="text"
                name="username"
                id="username"
                class="form-control"
                placeholder="Enter your username"
                required
            >

        </div>

        <div class="form-group">

            <label for="password">

                Password

            </label>

            <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="Enter your password"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100"
        >

            <i class="fa-solid fa-right-to-bracket"></i>

            Login

        </button>

    </form>

    <div class="form-footer">

        <p>

            Don't have an account?

            <a href="{% url 'register' %}">

                Register here

            </a>

        </p>

    </div>

</div>

{% endblock %}
